<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Startup Idle Clicker</title>
    <meta name="description" content="Build your tech startup empire from a single line of code!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header Navigation -->
<header class="app-header">
    <div class="header-title" id="company-name-display"><i class="fas fa-terminal"></i> My Startup</div>
    <div class="header-controls">
        <a href="../index.html" class="header-btn" style="text-decoration:none; margin-right:15px; border-color:transparent;"><i class="fas fa-arrow-left"></i> Portal</a>
        <button id="btn-leaderboard" class="header-btn"><i class="fas fa-chart-line"></i> Leaderboard</button>
        <button id="btn-trophies" class="header-btn"><i class="fas fa-trophy"></i> Trophies</button>
        <button id="btn-settings" class="header-btn"><i class="fas fa-cog"></i> Settings</button>
    </div>
</header>

<div class="app-container">
    <!-- Clicker Main Display -->
    <main class="clicker-section" id="click-area">
        <div class="stats-container">
            <h1 class="code-count" id="code-count">0</h1>
            <div class="cps-count"><span id="cps-count">0 lines / second</span></div>
        </div>
        
        <div class="main-button-container">
            <div class="main-button" id="main-button">
                <i class="fas fa-laptop-code"></i>
            </div>
        </div>
    </main>

    <!-- Upgrades & Store Sidebar -->
    <aside class="upgrades-section">
        <!-- Banner Ad Placeholder -->
        <div class="ad-banner">
            <span>[ Ad Placement Top Banner ]</span>
        </div>

        <h2 class="section-title">Operations</h2>
        
        <div id="ipo-container"></div>

        <div id="upgrades-container">
            <!-- Dynamically injected upgrades go here -->
        </div>

        <!-- Rewarded Video Button -->
        <button class="rewarded-ad-btn" id="rewarded-ad-btn">
            <i class="fas fa-video"></i> Watch Ad for 2x Boost!
        </button>
        <div class="ad-active-tag" id="ad-active-tag"></div>
        
        <div class="ad-banner" style="margin-top: 1rem; margin-bottom: 0;">
            <span>[ Ad Placement Bottom ]</span>
        </div>
    </aside>
</div>

<!-- Modal Overlay -->
<div id="modal-overlay" class="modal-overlay">
    <div id="modal-content" class="modal-box">
        <button id="modal-close" class="modal-close"><i class="fas fa-times"></i></button>
        <h2 id="modal-title">Title</h2>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<!-- Hidden Utility Links for File operations -->
<input type="file" id="file-import" style="display:none;" accept=".json,.txt" onchange="handleFileImport(event)">
<a id="download-anchor" style="display:none;"></a>

<script src="script.js"></script>
</body>
</html>
